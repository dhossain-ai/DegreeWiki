name = "degreewiki"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/index.js"

[assets]
directory = "./dist"

# Local dev secrets go in .dev.vars (never commit that file).
# See .dev.vars.example for the required keys.
# Astro's Cloudflare adapter enables sessions and expects a KV binding named SESSION.
# Create a real KV namespace in Cloudflare and bind it as SESSION before production deploys.
# Do not commit real namespace IDs to this repository.
# Manual setup lives in docs/08-ai-deployment-checklist.md.
#
# Example binding shape after manual setup:
# [[kv_namespaces]]
# binding = "SESSION"
# add the real namespace id only after creating the namespace in Cloudflare
#
# Cloudflare production secrets are set via:
#   npx wrangler pages secret put GEMINI_API_KEY
#   npx wrangler pages secret put SUPABASE_SERVICE_ROLE_KEY
